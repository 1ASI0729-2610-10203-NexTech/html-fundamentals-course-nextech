<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Introducción a CSS</title>
  <style>
    /* Este estilo cambia el fondo de la página */
    body {
        background-color: lightblue;
        font-family: Arial, sans-serif;
    }

    h1 {
        color: blue;
    }

    p {
        color: gray;
        font-size: 18px;
    }

    h1, h2 {
        color: purple;
    }

    .tarjeta {
        background-color: white;
        border: 2px solid black;
    }
  </style>
</head>
<body>

  <h1>Mi página web</h1>
  <p>Estoy aprendiendo CSS.</p>

  <div class="tarjeta">
    <h1>Mi perfil</h1>
    <p>Estoy aprendiendo desarrollo web.</p>
  </div>

</body>
</html>
