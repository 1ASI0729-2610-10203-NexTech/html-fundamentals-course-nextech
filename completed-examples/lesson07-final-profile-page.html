<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi perfil personal</title>
  <style>
    body { background-color: #eef2ff; font-family: Arial, sans-serif; margin: 0; padding: 40px; }
    .profile-card { background-color: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 16px; text-align: center; box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    h1 { color: #1f2937; }
    img { width: 150px; border-radius: 50%; }
    p { color: #4b5563; line-height: 1.5; }
    ul { text-align: left; display: inline-block; }
    a { display: inline-block; margin-top: 16px; color: white; background-color: #2563eb; padding: 10px 16px; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <main class="profile-card">
    <h1>Hola, soy Ana</h1>
    <img src="https://via.placeholder.com/150" alt="Foto de perfil">
    <p>Estoy aprendiendo desarrollo web con HTML y CSS. Esta es mi primera página personal.</p>
    <h2>Mis intereses</h2>
    <ul><li>Programación</li><li>Diseño web</li><li>Música</li></ul>
    <br><a href="https://www.wikipedia.org" target="_blank">Conocer más</a>
  </main>
</body>
</html>
